<!DOCTYPE html>
<html lang="en-US">
	<head>
		<title>File Element: AUI</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<meta name="og:title" content="File Element" />
		<meta name="description" content="A custom element with file-drop and file-picker support." />
		<meta property="og:type" content="website" />
		<link rel="stylesheet" href="../index.css" />
		<link rel="shortcut icon" href="../favicon.ico" />
		<script type="module">
			import { FileElement } from "./file.js"

			customElements.define("a-file", FileElement)
		</script>
		<style>
			a-file {
				display: block;
				height: 150px;
				width: 300px;
				border-radius: 0.125rem;
				outline: 1px dashed var(--CanvasText);
			}
		</style>
	</head>

	<body>
		<h1>File Element</h1>
		<p>A custom element with file-drop and file-picker support.</p>
		<a-file tabindex="0"></a-file>
		<pre><code>&lt;a-file&gt;&lt;/a-file&gt;</code></pre>
	</body>
</html>
