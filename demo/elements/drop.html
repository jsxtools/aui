<!DOCTYPE html>
<html lang="en-US">
	<head>
		<title>Drop Element: AUI</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<meta name="og:title" content="Drop Element" />
		<meta name="description" content="A custom element with drop support." />
		<meta property="og:type" content="website" />
		<link rel="stylesheet" href="../index.css" />
		<link rel="shortcut icon" href="../favicon.ico" />
		<script type="module">
			import { DropElement } from "./drop.js"

			customElements.define("a-drop", DropElement)
		</script>
		<style>
			a-drop {
				display: block;
				height: 150px;
				width: 300px;
				border-radius: 0.125rem;
				outline: 1px dashed var(--CanvasText);
			}
		</style>
	</head>

	<body>
		<h1>Drop Element</h1>
		<p>A custom element with drop support.</p>
		<a-drop></a-drop>
		<pre><code>&lt;a-drop&gt;&lt;/a-drop&gt;</code></pre>
	</body>
</html>
